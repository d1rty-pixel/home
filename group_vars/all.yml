---
# ---------------------------------------------------------------------------
# Feature toggles
# ---------------------------------------------------------------------------
# Install GUI applications (firefox, vlc, ...). Flip to false on a headless box.
install_gui: true

# Deploy the captured Thunderbird profile (accounts + saved passwords). Needs the
# vault password and a capture in roles/thunderbird/files/profile/ (see
# scripts/capture-thunderbird.sh). No-op until a capture exists.
deploy_thunderbird: true

# ---------------------------------------------------------------------------
# Git identity — used to template ~/.gitconfig
# ---------------------------------------------------------------------------
# TODO: set your real display name here.
git_user_name: "equinox"
git_user_email: "equinox@lichtspiele.org"
