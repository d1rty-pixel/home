---
# Arch-only role: make sure an AUR helper (yay) exists, then install AUR packages.
- name: Ensure base-devel and git are present (needed to build yay)
  community.general.pacman:
    name:
      - base-devel
      - git
    state: present
  become: true

- name: Check whether yay is already installed
  ansible.builtin.command: command -v yay
  register: yay_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Build and install yay from the AUR
  when: yay_check.rc != 0
  block:
    - name: Clone yay-bin from the AUR
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay-bin.git
        dest: /tmp/yay-bin
        version: master

    # makepkg refuses to run as root, so build as the normal user WITHOUT -i.
    # (Its internal `sudo pacman -U` has no terminal for the password otherwise.)
    - name: Build the yay-bin package (as the normal user, no install)
      ansible.builtin.command:
        cmd: makepkg -f --noconfirm
        chdir: /tmp/yay-bin
      become: false

    - name: Locate the built yay package
      ansible.builtin.find:
        paths: /tmp/yay-bin
        patterns: "yay-bin-*.pkg.tar.*"
      register: yay_pkg

    - name: Install the built yay package (Ansible handles privilege escalation)
      ansible.builtin.command:
        cmd: "pacman -U --noconfirm {{ yay_pkg.files | map(attribute='path') | join(' ') }}"
      become: true
      when: yay_pkg.matched > 0

- name: Install AUR packages
  kewlfft.aur.aur:
    name: "{{ aur_packages }}"
    state: present
    use: yay
  become: false
  when: aur_packages | length > 0
