---
- name: Check whether Claude Code is installed
  ansible.builtin.command: command -v claude
  register: claude_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install Claude Code via the official installer
  ansible.builtin.shell:
    cmd: "curl -fsSL https://claude.ai/install.sh | bash"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/bin/claude"
  become: false
  when: claude_check.rc != 0
