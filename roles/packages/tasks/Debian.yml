---
- name: Update apt cache and install system packages
  ansible.builtin.apt:
    name: "{{ system_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install GUI packages
  ansible.builtin.apt:
    name: "{{ gui_packages }}"
    state: present
  become: true
  when:
    - install_gui | bool
    - gui_packages | length > 0

- name: Install third-party desktop apps (Spotify, Google Chrome)
  ansible.builtin.include_tasks: Debian-thirdparty.yml
  when: install_gui | bool
