---
# Dispatch to the package tasks for the detected OS family.
- name: Install packages for this OS family
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] }}.yml"

# Remove packages the user always wants gone (e.g. OS-provided apps replaced by a
# third-party install). Conditional removals (Firefox<-Chrome) live in their roles.
- name: Ensure unwanted packages are absent
  ansible.builtin.package:
    name: "{{ packages_absent }}"
    state: absent
  become: true
  when: packages_absent | length > 0
