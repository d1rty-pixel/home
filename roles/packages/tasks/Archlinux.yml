---
- name: Update pacman cache and install system packages
  community.general.pacman:
    name: "{{ system_packages }}"
    state: present
    update_cache: true
  become: true

- name: Install GUI packages
  community.general.pacman:
    name: "{{ gui_packages }}"
    state: present
  become: true
  when:
    - install_gui | bool
    - gui_packages | length > 0
