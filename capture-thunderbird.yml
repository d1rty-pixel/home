---
# Maintenance playbook — NOT part of provisioning. Captures this machine's Thunderbird
# accounts + saved passwords into the repo, vault-encrypted, so the thunderbird role can
# redeploy them elsewhere. Run it after you change your Thunderbird setup:
#
#   ansible-playbook capture-thunderbird.yml
#
# Requires a vault password FILE (a task can't answer an interactive vault prompt):
#   printf 'your-vault-password' > .vault-pass && chmod 600 .vault-pass
#
- name: Capture Thunderbird profile into the repo (vault-encrypted)
  hosts: localhost
  gather_facts: true
  vars:
    tb_profile: "o9utqzgx.default-release"     # override with -e tb_profile=...
    tb_files: [prefs.js, logins.json, key4.db, cert9.db]
    tb_dir: "{{ ansible_facts.env.HOME }}/.thunderbird"
    dest: "{{ playbook_dir }}/roles/thunderbird/files/profile"
    vault_password_file: "{{ playbook_dir }}/.vault-pass"

  tasks:
    - name: Require a vault password file
      ansible.builtin.stat:
        path: "{{ vault_password_file }}"
      register: vpf

    - name: Fail if no vault password file
      ansible.builtin.fail:
        msg: >-
          Create {{ vault_password_file }} first:
          printf 'your-vault-password' > .vault-pass && chmod 600 .vault-pass
      when: not vpf.stat.exists

    - name: Ensure Thunderbird is not running
      ansible.builtin.command: pgrep -x thunderbird
      register: tb_running
      changed_when: false
      failed_when: tb_running.rc == 0
      check_mode: false

    - name: Check which profile files exist
      ansible.builtin.stat:
        path: "{{ tb_dir }}/{{ tb_profile }}/{{ item }}"
      loop: "{{ tb_files }}"
      register: tb_stat

    - name: Ensure the destination directory exists
      ansible.builtin.file:
        path: "{{ dest }}"
        state: directory
        mode: "0755"

    - name: Copy profile files into the repo
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: "{{ dest }}/{{ item.item }}"
        mode: "0600"
        remote_src: true
      loop: "{{ tb_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists

    - name: Vault-encrypt the copied files
      ansible.builtin.command:
        cmd: "ansible-vault encrypt --vault-password-file {{ vault_password_file }} {{ dest }}/{{ item.item }}"
      loop: "{{ tb_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      changed_when: true

    - name: Verify each file is actually encrypted (never commit plaintext)
      ansible.builtin.command: "head -c 15 {{ dest }}/{{ item.item }}"
      register: tb_hdr
      changed_when: false
      loop: "{{ tb_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      failed_when: "'$ANSIBLE_VAULT' not in tb_hdr.stdout"

    - name: Next step
      ansible.builtin.debug:
        msg: "Captured. Review, then: git add roles/thunderbird/files/profile && git commit"
