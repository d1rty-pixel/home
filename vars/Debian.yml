---
# Debian / Ubuntu role-specific vars (working stub — verify against the target release).
#
# NOTE: system / GUI package names and the third-party (Chrome/Spotify) routing now
# live in the OS-agnostic vars/software_catalog.yml and are resolved on the host by
# roles/software-facts. Only vars consumed by other roles remain here.

# Docker (roles/docker + roles/docker-compose)
docker_packages:
  - docker.io
docker_compose_packages:
  - docker-compose     # TODO: prefer 'docker-compose-plugin' from Docker's apt repo

# Perl modules from apt (Debian naming: lib<module>-perl).
perl_os_packages: []
# perl_os_packages:
#   - libjson-perl
#   - libwww-perl

# Packages to always ensure ABSENT (unconditional).
packages_absent: []

# Thunderbird's .desktop name differs on Debian/Ubuntu (verify on the target).
default_mail_desktop: "thunderbird.desktop"   # TODO: may be org.mozilla.Thunderbird.desktop
