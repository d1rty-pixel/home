---
# Working stub for a future Debian / Ubuntu machine.
# Names are mapped to apt equivalents — verify against the target release.
system_packages:
  - bash
  - fish
  - vim
  - micro
  - meld
  - git
  - ripgrep
  - btop
  - htop
  - glances
  - fastfetch          # TODO: only in newer Debian/Ubuntu; may need a backport/PPA
  - duf
  - ufw
  - rsync
  - wget
  - pavucontrol
  # NOTE: no alacritty here — use the distro-default terminal on Debian/Ubuntu.
  # NOTE: starship is installed via roles/starship (official installer), not apt.

gui_packages:
  - thunderbird
  - vlc
  - haruna
  # Firefox (firefox-esr) is intentionally NOT installed: it's removed once Google
  # Chrome is present (see Debian-thirdparty.yml).

# Spotify and Google Chrome are NOT plain apt packages — they come from third-party
# apt repos and are installed by roles/packages/tasks/Debian-thirdparty.yml.
# JetBrains Toolbox (which manages IntelliJ IDEA) is installed by the shared,
# OS-agnostic `jetbrains-toolbox` role. All are gated by install_gui.

# Docker (roles/docker + roles/docker-compose)
docker_packages:
  - docker.io
docker_compose_packages:
  - docker-compose     # TODO: prefer 'docker-compose-plugin' from Docker's apt repo

# Perl modules from apt (Debian naming: lib<module>-perl).
perl_os_packages: []
# perl_os_packages:
#   - libjson-perl
#   - libwww-perl

# Packages to always ensure ABSENT.
packages_absent: []

# Not used on Debian, kept so shared tasks referencing it don't error.
aur_packages: []
