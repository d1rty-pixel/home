---
# Package names for Arch / CachyOS (pacman + AUR).
system_packages:
  - bash
  - fish
  - vim
  - micro
  - meld
  - git
  - ripgrep
  - btop
  - htop
  - glances
  - fastfetch
  - duf
  - ufw
  - rsync
  - wget
  - starship
  - alacritty          # terminal emulator (Arch/CachyOS only)
  - pavucontrol
  - spotify-launcher

gui_packages:
  - thunderbird
  - vlc
  - haruna
  # Firefox is intentionally NOT installed here: it is removed once Google Chrome
  # is present (see roles/aur). IntelliJ IDEA comes via the JetBrains Toolbox role.

# AUR packages — built and installed by roles/aur (needs yay/base-devel).
aur_packages:
  - google-chrome

# Docker (roles/docker + roles/docker-compose)
docker_packages:
  - docker
  - docker-buildx
docker_compose_packages:
  - docker-compose

# Perl modules from the OS package manager (Arch naming: perl-<module>).
perl_os_packages: []
# perl_os_packages:
#   - perl-json
#   - perl-libwww

# Packages to always ensure ABSENT (e.g. an OS-provided app superseded by a
# third-party install). Firefox is handled conditionally in roles/aur instead.
packages_absent: []
