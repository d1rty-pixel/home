---
# Arch / CachyOS role-specific vars.
#
# NOTE: system / GUI / AUR package names now live in the OS-agnostic
# vars/software_catalog.yml and are resolved on the host by roles/software-facts.
# Only vars consumed by other roles remain here.

# Docker (roles/docker + roles/docker-compose)
docker_packages:
  - docker
  - docker-buildx
docker_compose_packages:
  - docker-compose

# Perl modules from the OS package manager (Arch naming: perl-<module>).
perl_os_packages: []
# perl_os_packages:
#   - perl-json
#   - perl-libwww

# Packages to always ensure ABSENT (unconditional). Conditional replacements
# (Firefox<-Chrome) are declared via `supersedes` in the catalog and removed by
# their roles once the superseder is installed.
packages_absent: []
