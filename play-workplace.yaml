---
- name: Provision the workplace
  hosts: localhost,workstation
  gather_facts: true

  pre_tasks:
    - name: Load OS-family-specific variables
      ansible.builtin.include_vars: "vars/{{ ansible_facts['os_family'] }}.yml"

  roles:
    - packages
    - role: aur
      when: ansible_facts['os_family'] == 'Archlinux'
    - nodejs
    - perl
    - docker
    - docker-compose
    - starship
    - claude-code
    - role: jetbrains-toolbox
      when: install_gui | bool
    - role: thunderbird
      when:
        - install_gui | bool
        - deploy_thunderbird | bool
      tags: thunderbird
    - role: default-apps
      when: install_gui | bool
      tags: default-apps
    - dotfiles
    - shell
